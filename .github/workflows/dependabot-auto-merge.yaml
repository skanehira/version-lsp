name: Dependabot Auto-merge

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-automation:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    timeout-minutes: 13
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Approve & enable auto-merge for Dependabot PR
        # Skip auto-merge for github_actions updates: those PRs modify files
        # under .github/workflows/, and merging such changes requires the
        # `workflows` scope that the default GITHUB_TOKEN cannot be granted.
        # Without this guard the job fails with:
        #   "refusing to allow a GitHub App to create or update workflow ...
        #    without `workflows` permission (mergePullRequest)".
        # GitHub Actions updates must therefore be merged manually (or via a
        # PAT / GitHub App that holds the `workflow` scope).
        if: |
          steps.metadata.outputs.package-ecosystem != 'github_actions' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor')
        run: |
          gh pr merge --auto -s "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
